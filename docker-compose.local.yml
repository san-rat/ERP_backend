x-jwt-secret: &jwt_secret "your-super-secret-key-change-in-production-at-least-32-chars!!"
x-sqlserver-connection: &sqlserver_connection "Server=sqlserver,1433;Database=insighterp_db;User Id=sa;Password=LocalDev_Password123!;TrustServerCertificate=True;"
x-internal-service-key: &internal_service_key "local-dev-internal-service-key"

services:
  sqlserver:
    healthcheck:
      test:
        - CMD-SHELL
        - >
          if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then
            /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" > /dev/null;
          else
            /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" > /dev/null;
          fi
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  apigateway:
    build:
      context: ./src/ApiGateway
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      JWT_SECRET: *jwt_secret
    ports:
      - "5000:8080"

  authservice:
    build:
      context: ./src/AuthService
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AuthDb: *sqlserver_connection
      JWT_SECRET: *jwt_secret

  customerservice:
    build:
      context: ./src/CustomerService
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: *sqlserver_connection
      JwtSettings__SecretKey: *jwt_secret
      ServiceEndpoints__ProductService: "http://productservice:8080"
      ServiceEndpoints__OrderService: "http://orderservice:8080"
      InternalServiceAuth__HeaderName: "X-Internal-Service-Key"
      InternalServiceAuth__ServiceKey: *internal_service_key
    ports:
      - "5002:8080"

  orderservice:
    build:
      context: ./src/OrderService
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: *sqlserver_connection
      JWT_SECRET: *jwt_secret
      Kafka__BootstrapServers: ""
      ServiceEndpoints__ProductService: "http://productservice:8080"
      InternalServiceAuth__HeaderName: "X-Internal-Service-Key"
      InternalServiceAuth__ServiceKey: *internal_service_key

  productservice:
    build:
      context: ./src/ProductService
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: *sqlserver_connection
      JWT_SECRET: *jwt_secret
      InternalServiceAuth__HeaderName: "X-Internal-Service-Key"
      InternalServiceAuth__ServiceKey: *internal_service_key

  forecastservice:
    build:
      context: ./src/ForecastService
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__insighterp_db: *sqlserver_connection

  predictionservice:
    build:
      context: ./src/PredictionService
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__ChurnDb: *sqlserver_connection

  analyticsservice:
    build:
      context: ./src/AnalyticsService
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development

  adminservice:
    build:
      context: ./src/AdminService
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AuthDb: *sqlserver_connection
      JWT_SECRET: *jwt_secret
