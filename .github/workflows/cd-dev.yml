name: CD Dev — Migrate, Build & Push all services, Deploy to Azure

on:
  push:
    branches: [ "dev" ]

# Required for OIDC authentication (passwordless Azure login)
permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mysql client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Debug DB env (safe)
        shell: bash
        env:
          MYSQL_HOST: ${{ secrets.AZ_MYSQL_HOST }}
          MYSQL_DB: ${{ secrets.AZ_MYSQL_DB }}
          MYSQL_USER: ${{ secrets.AZ_MYSQL_MIGRATOR_USER }}
        run: |
          echo "MYSQL_HOST=$MYSQL_HOST"
          echo "MYSQL_DB=$MYSQL_DB"
          echo "MYSQL_USER=$MYSQL_USER"

      - name: Apply DB migrations (Azure MySQL)
        shell: bash
        env:
          MYSQL_HOST: ${{ secrets.AZ_MYSQL_HOST }}
          MYSQL_DB: ${{ secrets.AZ_MYSQL_DB }}
          MYSQL_USER: ${{ secrets.AZ_MYSQL_MIGRATOR_USER }}
          MYSQL_PASSWORD: ${{ secrets.AZ_MYSQL_MIGRATOR_PASSWORD }}
        run: |
          bash ./scripts/apply_migrations.sh db/auth/migrations

      - name: Docker login to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build and push all images to ACR
        run: |
          SERVICES=(apigateway analyticsservice authservice customerservice forecastservice orderservice predictionservice productservice)
          SRC_DIRS=(ApiGateway AnalyticsService AuthService CustomerService ForecastService OrderService PredictionService ProductService)

          for i in "${!SERVICES[@]}"; do
            SVC="${SERVICES[$i]}"
            DIR="${SRC_DIRS[$i]}"
            IMAGE_SHA="${{ secrets.ACR_LOGIN_SERVER }}/${SVC}:${{ github.sha }}"
            IMAGE_LATEST="${{ secrets.ACR_LOGIN_SERVER }}/${SVC}:latest"

            echo ">>> Building ${SVC}..."
            docker build -t "$IMAGE_SHA" -t "$IMAGE_LATEST" -f "src/${DIR}/Dockerfile" "src/${DIR}"

            echo ">>> Pushing ${SVC}..."
            docker push "$IMAGE_SHA"
            docker push "$IMAGE_LATEST"
          done

      - name: Azure Login (OIDC — no password needed)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy all services to Azure Container Apps
        run: |
          SERVICES=(apigateway    analyticsservice    authservice    customerservice    forecastservice    orderservice    predictionservice    productservice)
          APP_NAMES=(apigateway-dev analyticsservice-dev authservice-dev customerservice-dev forecastservice-dev orderservice-dev predictionservice-dev productservice-dev)

          for i in "${!SERVICES[@]}"; do
            SVC="${SERVICES[$i]}"
            APP="${APP_NAMES[$i]}"
            IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${SVC}:${{ github.sha }}"

            echo ">>> Configuring ACR credentials for ${APP}..."
            az containerapp registry set \
              --name "$APP" \
              --resource-group erp-rg \
              --server "${{ secrets.ACR_LOGIN_SERVER }}" \
              --username "${{ secrets.ACR_USERNAME }}" \
              --password "${{ secrets.ACR_PASSWORD }}"

            echo ">>> Deploying ${APP} with image ${IMAGE}..."
            az containerapp update \
              --name "$APP" \
              --resource-group erp-rg \
              --image "$IMAGE"

            # Keep the gateway and auth service always warm (minReplicas=1)
            # so the frontend never hits a cold-start on first load
            if [[ "$APP" == "apigateway-dev" || "$APP" == "authservice-dev" ]]; then
              az containerapp update \
                --name "$APP" \
                --resource-group erp-rg \
                --min-replicas 1
            fi
          done

      - name: Configure AuthService DB connection string
        env:
          AUTH_DB_CONN: ${{ secrets.AUTH_DB_CONNECTION_STRING }}
        run: |
          echo ">>> Setting ConnectionStrings__AuthDb secret on authservice-dev..."
          az containerapp secret set \
            --name authservice-dev \
            --resource-group erp-rg \
            --secrets "auth-db-conn=$AUTH_DB_CONN"

          az containerapp update \
            --name authservice-dev \
            --resource-group erp-rg \
            --set-env-vars "ConnectionStrings__AuthDb=secretref:auth-db-conn"

      - name: Smoke test — AuthService health check
        run: |
          echo "Waiting 30s for new revision to become active..."
          sleep 30
          curl -fsS "${{ secrets.AUTH_SERVICE_URL }}/health"