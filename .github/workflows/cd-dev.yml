name: CD Dev — Migrate, Build & Push all services, Deploy to Azure

on:
  push:
    branches: [ "dev" ]

# Required for OIDC authentication (passwordless Azure login)
permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sqlcmd
        run: sudo apt-get update && sudo apt-get install -y mssql-tools18 unixodbc-dev

      - name: Debug DB env (safe)
        shell: bash
        env:
          AZURE_SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
          AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
          AZURE_SQL_USER: ${{ secrets.AZURE_SQL_USER }}
        run: |
          echo "AZURE_SQL_SERVER=$AZURE_SQL_SERVER"
          echo "AZURE_SQL_DATABASE=$AZURE_SQL_DATABASE"
          echo "AZURE_SQL_USER=$AZURE_SQL_USER"

      - name: Apply DB migrations (Azure SQL)
        shell: bash
        env:
          AZURE_SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
          AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
          AZURE_SQL_USER: ${{ secrets.AZURE_SQL_USER }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
        run: |
          # Add mssql-tools to PATH
          export PATH="$PATH:/opt/mssql-tools18/bin"

          TARGETS=(
            "schemas/auth/migrations:auth"
            "schemas/customer/migrations:customer"
            "schemas/product/migrations:product"
            "schemas/order/migrations:order"
            "schemas/prediction/migrations:ml"
            "schemas/analytics/migrations:analytics"
          )

          for target in "${TARGETS[@]}"; do
            IFS=':' read -r dir schema <<< "$target"
            echo ">>> Applying ${dir} to schema ${schema}..."
            bash ./scripts/apply_sqlserver_migrations.sh "$dir" "$schema"
          done

      - name: Docker login to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build and push all images to ACR
        run: |
          SERVICES=(apigateway adminservice analyticsservice authservice customerservice forecastservice orderservice predictionservice productservice)
          SRC_DIRS=(ApiGateway AdminService AnalyticsService AuthService CustomerService ForecastService OrderService PredictionService ProductService)

          for i in "${!SERVICES[@]}"; do
            SVC="${SERVICES[$i]}"
            DIR="${SRC_DIRS[$i]}"
            IMAGE_SHA="${{ secrets.ACR_LOGIN_SERVER }}/${SVC}:${{ github.sha }}"
            IMAGE_LATEST="${{ secrets.ACR_LOGIN_SERVER }}/${SVC}:latest"

            echo ">>> Building ${SVC}..."
            docker build -t "$IMAGE_SHA" -t "$IMAGE_LATEST" -f "src/${DIR}/Dockerfile" "src/${DIR}"

            echo ">>> Pushing ${SVC}..."
            docker push "$IMAGE_SHA"
            docker push "$IMAGE_LATEST"
          done

      - name: Azure Login (OIDC — no password needed)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy all services to Azure Container Apps
        run: |
          SERVICES=(apigateway    adminservice    analyticsservice    authservice    customerservice    forecastservice    orderservice    predictionservice    productservice)
          APP_NAMES=(apigateway-dev adminservice-dev analyticsservice-dev authservice-dev customerservice-dev forecastservice-dev orderservice-dev predictionservice-dev productservice-dev)

          for i in "${!SERVICES[@]}"; do
            SVC="${SERVICES[$i]}"
            APP="${APP_NAMES[$i]}"
            IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${SVC}:${{ github.sha }}"

            echo ">>> Configuring ACR credentials for ${APP}..."
            az containerapp registry set \
              --name "$APP" \
              --resource-group erp-rg \
              --server "${{ secrets.ACR_LOGIN_SERVER }}" \
              --username "${{ secrets.ACR_USERNAME }}" \
              --password "${{ secrets.ACR_PASSWORD }}"

            echo ">>> Deploying ${APP} with image ${IMAGE}..."
            az containerapp update \
              --name "$APP" \
              --resource-group erp-rg \
              --image "$IMAGE"

            # Keep the gateway and auth service always warm (minReplicas=1)
            # so the frontend never hits a cold-start on first load
            if [[ "$APP" == "apigateway-dev" || "$APP" == "authservice-dev" ]]; then
              az containerapp update \
                --name "$APP" \
                --resource-group erp-rg \
                --min-replicas 1
            fi
          done

      - name: Set ApiGateway environment to Dev
        run: |
          az containerapp update \
            --name apigateway-dev \
            --resource-group erp-rg \
            --set-env-vars "ASPNETCORE_ENVIRONMENT=Dev"

      - name: Configure AuthService DB connection string
        env:
          AUTH_DB_CONN: ${{ secrets.AUTH_DB_CONNECTION_STRING_AZURE }}
        run: |
          echo ">>> Setting ConnectionStrings__AuthDb secret on authservice-dev..."
          az containerapp secret set \
            --name authservice-dev \
            --resource-group erp-rg \
            --secrets "auth-db-conn=$AUTH_DB_CONN"

          az containerapp update \
            --name authservice-dev \
            --resource-group erp-rg \
            --set-env-vars "ConnectionStrings__AuthDb=secretref:auth-db-conn"

      - name: Configure PredictionService DB connection string
        env:
          PREDICTION_DB_CONN: ${{ secrets.AUTH_DB_CONNECTION_STRING_AZURE }}
        run: |
          echo ">>> Setting ConnectionStrings__ChurnDb secret on predictionservice-dev..."
          az containerapp secret set \
            --name predictionservice-dev \
            --resource-group erp-rg \
            --secrets "prediction-db-conn=$PREDICTION_DB_CONN"

          az containerapp update \
            --name predictionservice-dev \
            --resource-group erp-rg \
            --set-env-vars "ConnectionStrings__ChurnDb=secretref:prediction-db-conn"

      - name: Configure AdminService DB connection string
        env:
          ADMIN_DB_CONN: ${{ secrets.AUTH_DB_CONNECTION_STRING_AZURE }}
        run: |
          echo ">>> Setting ConnectionStrings__AuthDb secret on adminservice-dev..."
          az containerapp secret set \
            --name adminservice-dev \
            --resource-group erp-rg \
            --secrets "auth-db-conn=$ADMIN_DB_CONN"

          az containerapp update \
            --name adminservice-dev \
            --resource-group erp-rg \
            --set-env-vars "ConnectionStrings__AuthDb=secretref:auth-db-conn"

      - name: Configure ProductService DB connection string
        env:
          PRODUCT_DB_CONN: ${{ secrets.AUTH_DB_CONNECTION_STRING_AZURE }}
        run: |
          echo ">>> Setting ConnectionStrings__DefaultConnection secret on productservice-dev..."
          az containerapp secret set \
            --name productservice-dev \
            --resource-group erp-rg \
            --secrets "product-db-conn=$PRODUCT_DB_CONN"

          az containerapp update \
            --name productservice-dev \
            --resource-group erp-rg \
            --set-env-vars "ConnectionStrings__DefaultConnection=secretref:product-db-conn"

      - name: Configure OrderService DB connection string
        env:
          ORDER_DB_CONN: ${{ secrets.AUTH_DB_CONNECTION_STRING_AZURE }}
        run: |
          echo ">>> Setting ConnectionStrings__DefaultConnection secret on orderservice-dev..."
          az containerapp secret set \
            --name orderservice-dev \
            --resource-group erp-rg \
            --secrets "order-db-conn=$ORDER_DB_CONN"

          az containerapp update \
            --name orderservice-dev \
            --resource-group erp-rg \
            --set-env-vars "ConnectionStrings__DefaultConnection=secretref:order-db-conn"

      - name: Configure ForecastService DB connection string
        env:
          FORECAST_DB_CONN: ${{ secrets.AUTH_DB_CONNECTION_STRING_AZURE }}
        run: |
          echo ">>> Setting ConnectionStrings__insighterp_db secret on forecastservice-dev..."
          az containerapp secret set \
            --name forecastservice-dev \
            --resource-group erp-rg \
            --secrets "forecast-db-conn=$FORECAST_DB_CONN"

          az containerapp update \
            --name forecastservice-dev \
            --resource-group erp-rg \
            --set-env-vars "ConnectionStrings__insighterp_db=secretref:forecast-db-conn"

      - name: Resolve ApiGateway URL
        shell: bash
        run: |
          GATEWAY_FQDN="$(az containerapp show \
            --name apigateway-dev \
            --resource-group erp-rg \
            --query properties.configuration.ingress.fqdn \
            -o tsv)"

          if [[ -z "$GATEWAY_FQDN" ]]; then
            echo "Failed to resolve ApiGateway FQDN."
            exit 1
          fi

          echo "API_GATEWAY_URL=https://${GATEWAY_FQDN}" >> "$GITHUB_ENV"

      - name: Smoke tests — Service health checks via ApiGateway
        shell: bash
        run: |
          echo "Waiting 30s for new revisions to become active..."
          sleep 30

          ENDPOINTS=(
            "ApiGateway:/health"
            "AuthService:/auth/health"
            "AdminService:/admin/health"
            "ForecastService:/forecast/health"
            "PredictionService:/prediction/health"
          )

          for endpoint in "${ENDPOINTS[@]}"; do
            IFS=':' read -r service path <<< "$endpoint"
            url="${API_GATEWAY_URL}${path}"

            echo ">>> Smoke testing ${service} via ${url}"
            curl -fsS \
              --retry 6 \
              --retry-delay 10 \
              --retry-all-errors \
              --connect-timeout 10 \
              --max-time 30 \
              "$url"
            echo
          done

      - name: Smoke tests — Authenticated business endpoints via ApiGateway
        shell: bash
        env:
          API_GATEWAY_URL: ${{ env.API_GATEWAY_URL }}
          ADMIN_USERNAME: ${{ secrets.DEV_SMOKE_ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.DEV_SMOKE_ADMIN_PASSWORD }}
          EMPLOYEE_USERNAME: ${{ secrets.DEV_SMOKE_EMPLOYEE_USERNAME }}
          EMPLOYEE_PASSWORD: ${{ secrets.DEV_SMOKE_EMPLOYEE_PASSWORD }}
          MANAGER_USERNAME: ${{ secrets.DEV_SMOKE_MANAGER_USERNAME }}
          MANAGER_PASSWORD: ${{ secrets.DEV_SMOKE_MANAGER_PASSWORD }}
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          base_url = os.environ["API_GATEWAY_URL"].rstrip("/")

          def api_call(path, method="GET", token=None, payload=None):
              body = None if payload is None else json.dumps(payload).encode("utf-8")
              headers = {}
              if payload is not None:
                  headers["Content-Type"] = "application/json"
              if token:
                  headers["Authorization"] = f"Bearer {token}"

              request = urllib.request.Request(
                  f"{base_url}{path}",
                  data=body,
                  headers=headers,
                  method=method,
              )

              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      return response.read().decode("utf-8")
              except urllib.error.HTTPError as error:
                  payload = error.read().decode("utf-8")
                  raise SystemExit(
                      f"{method} {path} returned {error.code}: {payload[:500]}"
                  ) from error

          def login(username, password):
              response = json.loads(
                  api_call(
                      "/api/auth/login",
                      method="POST",
                      payload={"username": username, "password": password},
                  )
              )
              token = response.get("token")
              if not token:
                  raise SystemExit(f"Login for {username} did not return a token.")
              return token

          def unwrap(payload):
              if isinstance(payload, dict) and "success" in payload and "data" in payload:
                  return payload["data"]
              return payload

          admin_token = login(os.environ["ADMIN_USERNAME"], os.environ["ADMIN_PASSWORD"])
          employee_token = login(os.environ["EMPLOYEE_USERNAME"], os.environ["EMPLOYEE_PASSWORD"])
          manager_token = login(os.environ["MANAGER_USERNAME"], os.environ["MANAGER_PASSWORD"])

          overview = unwrap(json.loads(api_call("/api/admin/dashboard/overview", token=admin_token)))
          if overview["staff"]["totalUsers"] <= 0:
              raise SystemExit("Admin overview returned zero users.")
          if overview["business"]["products"] <= 0:
              raise SystemExit("Admin overview returned zero products.")

          products = unwrap(json.loads(api_call("/api/products", token=admin_token)))
          if not isinstance(products, list) or not products:
              raise SystemExit("Products endpoint returned no product data.")

          stock = unwrap(json.loads(api_call("/api/products/stock", token=employee_token)))
          if not isinstance(stock, list) or not stock:
              raise SystemExit("Product stock endpoint returned no stock data.")

          alerts = unwrap(
              json.loads(
                  api_call(
                      "/api/products/alerts?unresolvedOnly=true",
                      token=employee_token,
                  )
              )
          )
          if not isinstance(alerts, list):
              raise SystemExit("Product alerts endpoint did not return a list.")

          orders = unwrap(json.loads(api_call("/api/orders", token=manager_token)))
          if not isinstance(orders, list) or not orders:
              raise SystemExit("Orders endpoint returned no order data.")

          summary = unwrap(json.loads(api_call("/api/orders/reports/summary", token=manager_token)))
          summary_total = sum(
              value for value in summary.values() if isinstance(value, (int, float))
          )
          if summary_total <= 0:
              raise SystemExit("Order summary endpoint returned no aggregate counts.")

          metrics = unwrap(
              json.loads(api_call("/api/ml/forecast/analytics/products/metrics", token=manager_token))
          )
          metric_products = metrics.get("products") if isinstance(metrics, dict) else metrics
          if not isinstance(metric_products, list) or not metric_products:
              raise SystemExit("Forecast metrics endpoint returned no product metrics.")

          print("Authenticated smoke tests passed.")
          PY
